<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
  <meta name="apple-mobile-web-app-title" content="WTCapture">
  <link rel="manifest" href="manifest.json">
  <title>Weight Training Capture</title>

  <!-- TensorFlow.js フルパッケージ（converter含む） -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 画面1: エクササイズ選択 -->
  <div id="screen-select" class="screen active">
    <div class="select-inner">
      <h1>Weight Training<br>Capture</h1>
      <p class="subtitle">エクササイズを選択してください</p>
      <div class="exercise-buttons">
        <button class="btn-exercise" data-exercise="squat">
          <span class="ex-icon">🏋️</span>
          <span class="ex-name">スクワット</span>
          <span class="ex-angles">膝・股関節・背中</span>
        </button>
        <button class="btn-exercise" data-exercise="deadlift">
          <span class="ex-icon">💪</span>
          <span class="ex-name">デッドリフト</span>
          <span class="ex-angles">股関節・膝・背中</span>
        </button>
        <button class="btn-exercise" data-exercise="bulgarian">
          <span class="ex-icon">🦵</span>
          <span class="ex-name">ブルガリアン<br>スクワット</span>
          <span class="ex-angles">前後膝・股関節・体幹</span>
        </button>
      </div>
    </div>
  </div>

  <!-- 画面2: カメラ・録画 -->
  <div id="screen-camera" class="screen">
    <!-- カメラ映像（非表示・MoveNetの入力用） -->
    <video id="video" autoplay playsinline muted></video>
    <!-- 描画先（カメラ映像 + 骨格オーバーレイ） -->
    <canvas id="canvas"></canvas>

    <!-- UIオーバーレイ -->
    <div id="ui-overlay">
      <!-- 上部: エクササイズ名 + ステータス -->
      <div id="top-bar">
        <div id="exercise-label"></div>
        <div id="model-status">モデル読み込み中...</div>
      </div>

      <!-- 右上: 録画タイマー -->
      <div id="record-timer" class="hidden">00:00</div>

      <!-- 下部: コントロール -->
      <div id="controls">
        <button id="btn-back">← 戻る</button>
        <button id="btn-record" disabled>REC</button>
      </div>
    </div>
  </div>

  <!-- アプリスクリプト（CDN読み込み後に実行） -->
  <script src="js/angle-calculator.js"></script>
  <script src="js/pose-detector.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/recorder.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
